<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tem um viado me olhlando </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Envelope -->
        <div class="envelope-wrapper" id="envelope-wrapper">
            <div class="envelope">
                <div class="envelope-flap" id="envelope-flap"></div>
                <div class="envelope-body"></div>

                <!-- Selo -->
                <div class="seal" id="seal">
                    <img src="assets/seal.png" alt="Selo de Corvo">
                    <div class="glow"></div>
                </div>

                <!-- Cartão -->
                <div class="card" id="card">
                    <div class="card-content">
                        <h1>Feliz Aniversário, CHARLES (da dupla charles e chiquinho)!</h1>
                        <p class="message">Que as sombras te guiem e os corvos sussurrem segredos ancestrais em seu
                            caminho. Celebre a escuridão do seu dia. PARABENS PELOS SEUS 857 ANOS DE ALMA</p>

                        <button id="reveal-btn" class="upload-btn">
                            Revelar Presente Oculto
                        </button>
                    </div>
                </div>

                <!-- Parte frontal do envelope (sobre o cartão) -->
                <div class="envelope-front"></div>
            </div>
        </div>
    </div>

    <!-- Modal do Desenho -->
    <div id="image-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <div class="gothic-frame">
                <img id="modal-image" src="assets/drawing.png" alt="Presente Oculto">
            </div>
            <a href="assets/drawing.png" download="presente_sombrio.png" class="upload-btn"
                style="margin-top: 30px; text-decoration: none;">
                Baixar Desenho
            </a>

            <a href="https://open.spotify.com/playlist/6WtDnkYwjNq0lNn38k1Ca0?si=a218addf42664e84" target="_blank"
                class="upload-btn"
                style="margin-top: 15px; text-decoration: none; border-color: #1db954; color: #1db954;">
                Abrir Presente Misterioso
            </a>
        </div>
    </div>

    <!-- Música Tema -->
    <audio id="theme-song" src="assets/DRACULA THEME SONG - The Elijah Stanton Show (youtube).mp3"></audio>

    <!-- Botão de Mudo -->
    <button id="mute-btn" class="mute-btn" style="display: none;">
        🔊
    </button>

    <script src="script.js"></script>
</body>

</html>
